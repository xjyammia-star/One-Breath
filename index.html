<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="一炁堂 — 阴阳五行八卦AI分析平台。以古典命理之道，洞见自身、关系与世界。" />
    <meta name="keywords" content="八字,五行,阴阳,命盘,风水,道家,One Breath" />
    <title>一炁堂 / One Breath</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1612" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="一炁堂" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />

    <!-- iOS Splash Screen 背景色 -->
    <meta name="msapplication-TileColor" content="#ede5ce" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #ede5ce;
        font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', 'SimSun', serif;
      }
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(180deg, #ddd4b8 0%, #e8dfc8 30%, #f0e8d0 60%, #ede3cc 100%);
        z-index: 9999; gap: 2rem;
        transition: opacity 0.45s ease;
      }
      .splash-taiji {
        width: 80px; height: 80px;
        animation: splash-spin 6s linear infinite;
        opacity: 0.8;
        filter: drop-shadow(0 2px 12px rgba(155,125,58,0.2));
      }
      @keyframes splash-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      .splash-title {
        font-size: 2.6rem; font-weight: 500;
        letter-spacing: 0.6em; color: #1a1612;
        text-shadow: 1px 2px 6px rgba(26,22,18,0.1);
        animation: splash-fadein 0.8s ease both;
      }
      .splash-sub {
        font-size: 0.82rem; letter-spacing: 0.3em; color: #9b7d3a;
        animation: splash-fadein 1.1s ease both;
      }
      .splash-dots { display: flex; gap: 0.45rem; animation: splash-fadein 1.3s ease both; }
      .splash-dots span {
        width: 5px; height: 5px; border-radius: 50%; background: #9b7d3a;
        animation: splash-dot 1.4s ease-in-out infinite;
      }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-dot {
        0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
        40%            { transform: scale(1);   opacity: 1; }
      }
      @keyframes splash-fadein {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .splash-divider { display: flex; align-items: center; gap: 0.75rem; animation: splash-fadein 0.9s ease both; }
      .splash-divider-line { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, rgba(155,125,58,0.5), transparent); }
      .splash-divider-glyph { font-size: 1rem; color: rgba(155,125,58,0.5); }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <svg class="splash-taiji" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="48" fill="#ede5ce"/>
          <circle cx="50" cy="50" r="48" fill="none" stroke="#9b7d3a" stroke-width="2"/>
          <circle cx="50" cy="50" r="40" fill="none" stroke="#9b7d3a" stroke-width="1"/>
          <circle cx="50" cy="50" r="32" fill="#1a1612"/>
          <path d="M50,18 A32,32 0 0,1 50,82 L50,50 Z" fill="#f5f0e8"/>
          <circle cx="50" cy="34" r="16" fill="#f5f0e8"/>
          <circle cx="50" cy="66" r="16" fill="#1a1612"/>
          <circle cx="50" cy="34" r="5.5" fill="#1a1612"/>
          <circle cx="50" cy="66" r="5.5" fill="#f5f0e8"/>
          <circle cx="50" cy="50" r="32" fill="none" stroke="#9b7d3a" stroke-width="1.5"/>
        </svg>
        <div class="splash-title">一炁堂</div>
        <div class="splash-divider">
          <div class="splash-divider-line"></div>
          <span class="splash-divider-glyph">☯</span>
          <div class="splash-divider-line"></div>
        </div>
        <div class="splash-sub">阴阳 · 五行 · 八卦</div>
        <div class="splash-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('[PWA] Service Worker registered:', reg.scope)
          }).catch(function(err) {
            console.log('[PWA] Service Worker registration failed:', err)
          })
        })
      }

      // React 挂载后淡出加载屏
      (function () {
        var root = document.getElementById('root')
        var splash = document.getElementById('splash')
        if (!splash) return
        var observer = new MutationObserver(function () {
          var hasApp = false
          for (var i = 0; i < root.children.length; i++) {
            if (root.children[i].id !== 'splash') { hasApp = true; break }
          }
          if (hasApp) {
            observer.disconnect()
            splash.style.opacity = '0'
            setTimeout(function () {
              if (splash.parentNode) splash.parentNode.removeChild(splash)
            }, 480)
          }
        })
        observer.observe(root, { childList: true, subtree: false })
        setTimeout(function () {
          observer.disconnect()
          if (splash && splash.parentNode) {
            splash.style.opacity = '0'
            setTimeout(function () {
              if (splash.parentNode) splash.parentNode.removeChild(splash)
            }, 480)
          }
        }, 8000)
      })()
    </script>
  </body>
</html>
