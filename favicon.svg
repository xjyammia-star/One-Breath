<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="#ede5ce"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="#9b7d3a" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#9b7d3a" stroke-width="1"/>
  <!-- 太极：整圆黑色 -->
  <circle cx="50" cy="50" r="32" fill="#1a1612"/>
  <!-- 右半白色 -->
  <path d="M50,18 A32,32 0 0,1 50,82 L50,50 Z" fill="#f5f0e8"/>
  <!-- 上小圆白色 -->
  <circle cx="50" cy="34" r="16" fill="#f5f0e8"/>
  <!-- 下小圆黑色 -->
  <circle cx="50" cy="66" r="16" fill="#1a1612"/>
  <!-- 阳中阴点 -->
  <circle cx="50" cy="34" r="5.5" fill="#1a1612"/>
  <!-- 阴中阳点 -->
  <circle cx="50" cy="66" r="5.5" fill="#f5f0e8"/>
  <!-- 外框 -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#9b7d3a" stroke-width="1.5"/>
</svg>
